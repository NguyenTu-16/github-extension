<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cincinnati Football Highlights</title>
    <style>
        /* Bengals Color Scheme */
        body {
            background-color: #000000; /* Black background */
            color: #FFFFFF; /* White text for contrast */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }
        
        header {
            background-color: #FB4F14; /* Bengals Orange */
            padding: 30px;
            text-align: center;
            border-bottom: 5px solid #FFFFFF;
        }

        h1 {
            margin: 0;
            font-size: 2.5em;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #000000;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }

        h2 {
            color: #FB4F14;
            border-bottom: 2px solid #333333;
            padding-bottom: 10px;
        }

        .player-list {
            list-style-type: none;
            padding: 0;
        }

        .player-list li {
            background-color: #1A1A1A; /* Dark gray for cards */
            margin-bottom: 15px;
            padding: 20px;
            border-left: 6px solid #FB4F14; /* Orange accent */
            border-radius: 4px;
            font-size: 1.2em;
        }

        .player-name {
            font-weight: bold;
            color: #FB4F14;
            font-size: 1.1em;
        }
        
        .position {
            color: #CCCCCC;
            font-style: italic;
        }
    </style>
</head>
<body>

    <header>
        <h1>Who Dey!</h1>
    </header>

    <div class="container">
        <h2>Top 5 Franchise Players</h2>
        <p>A quick look at the talent driving the team forward:</p>
        
        <ul class="player-list">
            <li>
                <span class="player-name">Joe Burrow</span> <br>
                <span class="position">Quarterback</span>
            </li>
            <li>
                <span class="player-name">Ja'Marr Chase</span> <br>
                <span class="position">Wide Receiver</span>
            </li>
            <li>
                <span class="player-name">Trey Hendrickson</span> <br>
                <span class="position">Defensive End</span>
            </li>
            <li>
                <span class="player-name">Tee Higgins</span> <br>
                <span class="position">Wide Receiver</span>
            </li>
            <li>
                <span class="player-name">Logan Wilson</span> <br>
                <span class="position">Linebacker</span>
            </li>
        </ul>
    </div>

</body>
</html>
